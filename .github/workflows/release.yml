name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-latest
            artifact_glob: |
              release/*.exe
              release/*.blockmap
              release/latest.yml
          - name: macOS
            os: macos-latest
            artifact_glob: |
              release/*.dmg
              release/*.zip
              release/*.blockmap
              release/latest-mac.yml
          - name: Linux
            os: ubuntu-latest
            artifact_glob: |
              release/*.AppImage
              release/*.deb
              release/latest-linux.yml

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Package app
        run: npm run dist -- --publish never

      - name: Upload packaged assets
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.name }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download packaged assets
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release assets in display order
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          upload_group() {
            local name_pattern="$1"

            while IFS= read -r -d '' file; do
              gh release upload "$TAG_NAME" "$file" --clobber
            done < <(find release-assets -maxdepth 1 -type f -name "$name_pattern" -print0 | sort -z)
          }

          upload_group "*Setup*.exe"
          find release-assets -maxdepth 1 -type f -name "*.exe" ! -name "*Setup*.exe" -print0 | sort -z |
            while IFS= read -r -d '' file; do
              gh release upload "$TAG_NAME" "$file" --clobber
            done
          upload_group "*.dmg"
          upload_group "*-mac.zip"
          upload_group "*.AppImage"
          upload_group "*.deb"
          upload_group "*.yml"
          upload_group "*.blockmap"
